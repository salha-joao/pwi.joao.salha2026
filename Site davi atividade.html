<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Completo CSS</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Meu Site Completo</h1>
    <p class="subtitulo">
      Exemplo com mapa, vídeo, áudio e CSS avançado
    </p>
  </header>

  <nav>
    <ul>
      <li><a href="#video">Vídeo</a></li>
      <li><a href="#audio">Áudio</a></li>
      <li><a href="#mapa">Mapa</a></li>
    </ul>
  </nav>

  <main>

    <!-- VIDEO -->
    <section id="video">
      <h2>Vídeo do YouTube</h2>

      <iframe width="560" height="315"
        src="https://www.youtube.com/embed/tgbNymZ7vqY"
        title="YouTube video player"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </section>

    <!-- AUDIO -->
    <section id="audio">
      <h2>Áudio</h2>

      <audio controls>
        <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
        Seu navegador não suporta áudio.
      </audio>
    </section>

    <!-- MAPA -->
    <section id="mapa">
      <h2>Mapa Google</h2>

      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3656.889592324701!2d-46.652999!3d-23.564224"
        width="600"
        height="450"
        style="border:0;"
        allowfullscreen=""
        loading="lazy">
      </iframe>
    </section>

    <!-- FORMULÁRIO -->
    <section>
      <h2>Formulário</h2>

      <form>

        <label>Nome:</label>
        <input type="text" placeholder="Digite seu nome">

        <label>Email:</label>
        <input type="email" placeholder="Digite seu email">

        <label>Escolha uma cor:</label>
        <select>
          <option>Azul</option>
          <option>Vermelho</option>
          <option>Verde</option>
        </select>

        <button type="submit">Enviar</button>

      </form>
    </section>

  </main>

  <footer>
    <p>Site criado para estudo de CSS e HTML</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
